[custom.ssh]
symbol = "¾░ó╣"
description = "Connected via SSH"
command = "hostname -s"
format = "[[ $symbol $output ](fg:0 bg:14)]($style)"
style = "fg:0 bg:14"
when = '[ -n "$SSH_CLIENT" ] || [ -n "$SSH_TTY" ]'

[custom.tailscale]
symbol = "¾░ê║"
command = "tailscale status 2>/dev/null | awk '/exit node/{print $2; exit}'"
format = "[[ $symbol $output ](fg:0 bg:14)]($style)"
style = "(fg:0 bg:6)"
when = "tailscale status 2>/dev/null | grep -q 'exit node'"

[custom.wireguard]
symbol = "¯╗© "
command = "wg show interfaces"
format = "[[ $symbol $output ](fg:0 bg:14)]($style)"
style = "(fg:0 bg:14)"
when = "wg show interfaces | grep -q ."

[time]
disabled = false
time_format = "%H:%M"
style = "bg:4"
format = '[ $time ](fg:0 bg:4)'

[docker_context]
symbol = "´îê "
style = "bg:14"
format = '[[ $symbol $context ](fg:0 bg:14)]($style)'
