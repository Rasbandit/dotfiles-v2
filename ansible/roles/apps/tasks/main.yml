---
# Apps: Discord, Obsidian, Spotify (Flatpaks), pavucontrol, fonts

- name: Install pavucontrol
  ansible.builtin.dnf:
    name: pavucontrol
    state: present
  become: true
  when: os_distribution == 'fedora'

- name: Install pavucontrol (Debian)
  ansible.builtin.apt:
    name: pavucontrol
    state: present
  become: true
  when: os_family == 'debian'

- name: Install Flatpak apps (Discord, Obsidian, Spotify)
  community.general.flatpak:
    name: "{{ item }}"
    state: present
  loop:
    - com.discordapp.Discord
    - md.obsidian.Obsidian
    - com.spotify.Client
  become: true

- name: Include fonts setup
  ansible.builtin.include_tasks: fonts.yml
