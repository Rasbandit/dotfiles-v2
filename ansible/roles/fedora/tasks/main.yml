---
# Fedora-specific base setup: DNF config, repos, system-level packages
# Feature packages (terminal, 1password, etc.) are handled by feature roles.

- name: Configure DNF for faster downloads
  ansible.builtin.lineinfile:
    path: /etc/dnf/dnf.conf
    line: "{{ item }}"
    create: true
  loop:
    - "fastestmirror=true"
    - "max_parallel_downloads=20"
    - "installonly_limit=3"
    - "deltarpm=true"
    - "metadata_expire=24h"
  become: true

- name: Add RPM Fusion repository
  ansible.builtin.dnf:
    name: "https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ os_major_version }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  become: true

- name: Add Ghostty COPR repository
  community.general.copr:
    name: scottames/ghostty
    state: enabled
  become: true
  ignore_errors: true

- name: Install Fedora system packages
  ansible.builtin.dnf:
    name:
      - flatpak
      - dnf-plugin-system-upgrade
    state: present
  become: true

- name: Add Flathub repository
  community.general.flatpak_remote:
    name: flathub
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
    state: present
  become: true

- name: Swap mesa drivers for freeworld version
  ansible.builtin.command: dnf swap mesa-va-drivers mesa-va-drivers-freeworld -y
  become: true
  ignore_errors: true
