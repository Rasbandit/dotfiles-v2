---
# Base tasks that run on all systems

- name: Ensure common directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ lookup('env', 'HOME') }}/.local/bin"
    - "{{ lookup('env', 'HOME') }}/.config"
    - "{{ lookup('env', 'HOME') }}/.config/systemd/user"
  become: false
  tags: [terminal]

- name: Create bash_secrets if it doesn't exist
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.bash_secrets"
    state: touch
    mode: '0600'
    modification_time: preserve
    access_time: preserve
  become: false

- name: Install starship prompt
  ansible.builtin.shell: |
    curl -sS https://starship.rs/install.sh | sh -s -- -y
  args:
    creates: /usr/local/bin/starship
  become: true
  tags: [terminal]

- name: Set up hourly chezmoi sync cron job
  ansible.builtin.cron:
    name: "chezmoi auto sync"
    minute: "0"
    job: "{{ lookup('env', 'HOME') }}/.local/bin/auto-add-push.sh"
    state: present
