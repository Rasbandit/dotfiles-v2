---
# Debian/Ubuntu base setup: apt cache, Flathub
# Feature packages (terminal, 1password, etc.) are handled by feature roles.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install Debian system packages
  ansible.builtin.apt:
    name:
      - flatpak
    state: present
  become: true

- name: Add Flathub repository
  community.general.flatpak_remote:
    name: flathub
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
    state: present
  become: true
