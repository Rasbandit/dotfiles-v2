---
# Debian/Ubuntu specific setup

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install Debian terminal packages
  ansible.builtin.apt:
    name:
      - curl
      - jq
      - htop
      - fzf
      - zoxide
      - ripgrep
      - bat
      - btop
      - colordiff
      - fd-find
      - duf
      - iotop
      - tmux
    state: present
  become: true
  tags: [terminal]
  ignore_errors: true  # some packages may not exist in older releases

- name: Install rust via rustup
  ansible.builtin.shell: |
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  args:
    creates: "{{ lookup('env', 'HOME') }}/.cargo/bin/cargo"
  become: false
  tags: [terminal]

- name: Install eza via cargo (not always in apt)
  ansible.builtin.command: "{{ lookup('env', 'HOME') }}/.cargo/bin/cargo install eza"
  args:
    creates: "{{ lookup('env', 'HOME') }}/.cargo/bin/eza"
  become: false
  tags: [terminal]

- name: Install fastfetch (Ubuntu 23.10+/Debian 13+)
  ansible.builtin.apt:
    name: fastfetch
    state: present
  become: true
  ignore_errors: true

- name: Install Debian desktop packages
  ansible.builtin.apt:
    name:
      - pavucontrol
      - traceroute
      - gnome-tweaks
      - dconf-editor
      - python3-pip
      - nodejs
      - npm
      - flatpak
      - vlc
      - wireguard-tools
    state: present
  become: true
  when: machine_type in ['desktop', 'laptop']

- name: Add Flathub repository
  community.general.flatpak_remote:
    name: flathub
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
    state: present
  become: true
  when: machine_type in ['desktop', 'laptop']

- name: Install Flatpak apps (all desktop types)
  community.general.flatpak:
    name: "{{ item }}"
    state: present
  loop:
    - com.discordapp.Discord
    - md.obsidian.Obsidian
    - com.spotify.Client
  become: true
  when: machine_type in ['desktop', 'laptop']

- name: Install gaming/creative Flatpak apps (desktop only)
  community.general.flatpak:
    name: "{{ item }}"
    state: present
  loop:
    - com.obsproject.Studio
    - org.kde.kdenlive
  become: true
  when: machine_type == 'desktop'

- name: Include 1Password setup
  ansible.builtin.include_tasks: 1password.yml

- name: Include VS Code setup
  ansible.builtin.include_tasks: vscode.yml
