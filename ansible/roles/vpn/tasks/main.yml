---
# VPN: Tailscale + wireguard-tools

# --- Tailscale (Fedora) ---
- name: Import Tailscale GPG key (Fedora)
  ansible.builtin.rpm_key:
    key: https://pkgs.tailscale.com/stable/fedora/repo.gpg
    state: present
  become: true
  when: os_distribution == 'fedora'

- name: Add Tailscale repository (Fedora)
  ansible.builtin.yum_repository:
    name: tailscale-stable
    description: Tailscale stable
    baseurl: https://pkgs.tailscale.com/stable/fedora/$basearch
    enabled: true
    gpgcheck: true
    gpgkey: https://pkgs.tailscale.com/stable/fedora/repo.gpg
  become: true
  when: os_distribution == 'fedora'

- name: Install Tailscale + wireguard-tools (Fedora)
  ansible.builtin.dnf:
    name:
      - tailscale
      - wireguard-tools
    state: present
  become: true
  when: os_distribution == 'fedora'

# --- Tailscale (Debian/Ubuntu) ---
- name: Add Tailscale GPG key (Debian)
  ansible.builtin.apt_key:
    url: https://pkgs.tailscale.com/stable/{{ os_distribution }}/{{ ansible_distribution_release }}.gpg
    state: present
  become: true
  when: os_family == 'debian'
  ignore_errors: true

- name: Add Tailscale repository (Debian)
  ansible.builtin.apt_repository:
    repo: "deb https://pkgs.tailscale.com/stable/{{ os_distribution }} {{ ansible_distribution_release }} main"
    filename: tailscale
    state: present
  become: true
  when: os_family == 'debian'
  ignore_errors: true

- name: Install Tailscale + wireguard-tools (Debian)
  ansible.builtin.apt:
    name:
      - tailscale
      - wireguard-tools
    state: present
    update_cache: true
  become: true
  when: os_family == 'debian'

# --- Enable service (both distros) ---
- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  become: true
