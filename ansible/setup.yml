---
# Main setup playbook — Feature-based tags
#
# Usage:
#   ansible-playbook setup.yml --tags terminal,vpn --ask-become-pass
#   ansible-playbook setup.yml --tags all --ask-become-pass
#
# Features: terminal, 1password, vscode, browser, vpn, dev-tools,
#           gnome, openbox, claude, japanese, apps, gaming-laptop, gaming-desktop
#
# Base role always runs (tagged 'always').
# Fedora/debian roles always run for distro-specific repo setup.
# Feature roles only run when their tag is specified.
#
# machine_type values: temporary | server | workstation
# features: space-separated list in ~/.config/chezmoi/features

- name: Machine Setup
  hosts: localhost
  become: false

  vars:
    machine_type: >-
      {{ lookup('pipe',
           'cat ' + lookup('env', 'HOME') + '/.config/chezmoi/machine-type 2>/dev/null || echo'
         ) | trim
         | default(lookup('env', 'MACHINE_TYPE'), true)
         | default('workstation', true) }}

    features: >-
      {{ lookup('pipe',
           'cat ' + lookup('env', 'HOME') + '/.config/chezmoi/features 2>/dev/null || echo'
         ) | trim }}

  pre_tasks:
    - name: Detect OS distribution
      ansible.builtin.shell: |
        . /etc/os-release && echo "$ID"
      register: os_id_raw
      changed_when: false
      tags: always

    - name: Detect OS version
      ansible.builtin.shell: |
        . /etc/os-release && echo "${VERSION_ID%%.*}"
      register: os_version_raw
      changed_when: false
      tags: always

    - name: Set OS facts
      ansible.builtin.set_fact:
        os_distribution: "{{ os_id_raw.stdout | trim }}"
        os_family: "{{ 'debian' if os_id_raw.stdout | trim in ['debian', 'ubuntu'] else 'redhat' }}"
        os_major_version: "{{ os_version_raw.stdout | trim }}"
      tags: always

    - name: Display setup info
      ansible.builtin.debug:
        msg: "Setting up {{ os_distribution }} ({{ os_family }}) — type: {{ machine_type }}"
      tags: always

  roles:
    # Always runs: dirs, cron, bash_secrets
    - role: base
      tags: [always]

    # Distro-specific base setup: repos, DNF config, Flathub (always runs)
    - role: fedora
      when: os_distribution == 'fedora'
      tags: [always]

    - role: debian
      when: os_family == 'debian'
      tags: [always]

    # Feature roles — run only when their tag is specified
    - role: terminal
      tags: [terminal]

    - role: 1password
      tags: ['1password']

    - role: vscode
      tags: [vscode]

    - role: browser
      tags: [browser]

    - role: vpn
      tags: [vpn]

    - role: dev-tools
      tags: [dev-tools]

    - role: gnome
      tags: [gnome]

    - role: openbox
      tags: [openbox]

    - role: claude
      tags: [claude]

    - role: japanese
      tags: [japanese]

    - role: apps
      tags: [apps]

    - role: gaming-laptop
      tags: [gaming-laptop]

    - role: gaming-desktop
      tags: [gaming-desktop]
